openapi: 3.0.3
info:
  title: Vehicle Analytics API Assessment
  version: 1.0.0
  description: >
    Only the health endpoint is predefined. You must design and implement the
    metadata and data API, then document your full API in this spec (or a separate
    file) and describe how to view it in justification.md.
paths:
  /health:
    get:
      operationId: getHealth
      summary: Health check (implemented in skeleton)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  emulator:
                    type: boolean
                example:
                  status: 'ok'
                  emulator: true
        '503':
          description: Unhealthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  emulator:
                    type: boolean
                example:
                  status: 'unhealthy'
                  emulator: false
  /sensors:
    get:
      operationId: getSensors
      summary: Retrieve a list of available sensors
      responses:
        '200':
          description: A list of sensors
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    sensorId:
                      type: integer
                    sensorName:
                      type: string
                    unit:
                      type: string
                example:
                  - sensorId: 1000000070501
                    sensorName: 'BATTERY_TEMPERATURE'
                    unit: 'C'
                  - sensorId: 2000000051201
                    sensorName: 'TYRE_PRESSURE_FL'
                    unit: 'kPa'
                  - sensorId: 3000000060001
                    sensorName: 'PACK_CURRENT'
                    unit: 'A'
                  - sensorId: 3000000060101
                    sensorName: 'VEHICLE_SPEED'
                    unit: 'km/h'
        '503':
          description: Service unavailable
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                example:
                  error: 'Failed to retrieve sensors'
servers:
  - url: http://localhost:4000
    description: Local development server
