openapi: 3.0.3
info:
  title: Vehicle Analytics API Assessment
  version: 1.0.0
  description: >
    Only the health endpoint is predefined. You must design and implement the
    metadata and data API, then document your full API in this spec (or a separate
    file) and describe how to view it in justification.md.
paths:
  /health:
    get:
      tags:
        - Health
      operationId: getHealth
      summary: Health check (implemented in skeleton)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  emulator:
                    type: boolean
                example:
                  status: 'ok'
                  emulator: true
        '503':
          description: Unhealthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  emulator:
                    type: boolean
                example:
                  status: 'unhealthy'
                  emulator: false
  /sensors:
    get:
      tags:
        - Sensors
      operationId: getSensors
      summary: Retrieve metadata of all sensors
      responses:
        '200':
          description: Successful retrieval of sensor metadata
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SensorMetadata'
                example:
                  - sensorId: 1000000070501
                    sensorName: 'BATTERY_TEMPERATURE'
                    unit: 'C'
                  - sensorId: 2000000051201
                    sensorName: 'TYRE_PRESSURE_FL'
                    unit: 'kPa'
                  - sensorId: 3000000060001
                    sensorName: 'PACK_CURRENT'
                    unit: 'A'
                  - sensorId: 3000000060101
                    sensorName: 'VEHICLE_SPEED'
                    unit: 'km/h'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: 'Unexpected server error'
        '503':
          description: Service unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: 'Failed to retrieve sensors'
  /sensors/{sensorId}:
    get:
      tags:
        - Sensors
      operationId: getSensor
      summary: Retrieve metadata of a sensor
      parameters:
        - in: path
          name: sensorId
          required: true
          schema:
            type: number
          example: 1000000070501
          description: Unique identifier of the sensor
      responses:
        '200':
          description: Successful retrieval of sensor metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SensorMetadata'
              example:
                sensorId: 1000000070501
                sensorName: 'BATTERY_TEMPERATURE'
                unit: 'C'
        '400':
          description: Invalid sensor Id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: 'Invalid sensorId'
        '404':
          description: Sensor not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: 'Sensor not found'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: 'Unexpected server error'
components:
  schemas:
    SensorMetadata:
      type: object
      properties:
        sensorId:
          type: number
        sensorName:
          type: string
        unit:
          type: string
      example:
        sensorId: 1000000070501
        sensorName: 'BATTERY_TEMPERATURE'
        unit: 'C'
    Error:
      type: object
      properties:
        error:
          type: string
      example:
        error: 'An error occurred'
servers:
  - url: http://localhost:4000
    description: Local development server
