openapi: 3.0.3
info:
  title: Vehicle Analytics API Assessment
  version: 1.0.0
  description: >
    Only the health endpoint is predefined. You must design and implement the
    metadata and data API, then document your full API in this spec (or a separate
    file) and describe how to view it in justification.md.
paths:
  /health:
    get:
      operationId: getHealth
      summary: Health check (implemented in skeleton)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: 'ok'
                  emulator:
                    type: boolean
                    example: true
        '503':
          description: Unhealthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: 'unhealthy'
                  emulator:
                    type: boolean
                    example: false
servers:
  - url: http://localhost:4000
    description: Local development server
